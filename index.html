// ═══ MAIN APP ═════════════════════════════════════════════════════════════════
function App(){
  const saved=loadState();
  const [tab,setTab]=useState("stock");
  const [ri,setRi]=useState(()=>(saved&&saved.ri)||INIT_RAW.map((x,i)=>({...x,id:i,qty:x.d[3]||0})));
  const [wi,setWi]=useState(()=>(saved&&saved.wi)||INIT_WEEKLY.map((x,i)=>({...x,id:i+1000,qty:0})));
  const [jobs,setJobs]=useState(()=>(saved&&saved.jobs)||JOBS.map((x,i)=>({...x,id:i+2000})));
  const [saveMsg,setSaveMsg]=useState(null);
  const saveTimer=useRef(null);

  // Auto-save with debounce
  useEffect(()=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      saveState({ri,wi,jobs});
      setSaveMsg("✅ Saved");
      setTimeout(()=>setSaveMsg(null),1500);
    },1500);
    return()=>clearTimeout(saveTimer.current);
  },[ri,wi,jobs]);

  const manualSave=()=>{
    saveState({ri,wi,jobs});
    setSaveMsg("✅ Saved now!");
    setTimeout(()=>setSaveMsg(null),2000);
  };

  const updateRi=(id,field,val)=>setRi(p=>p.map(x=>x.id===id?{...x,[field]:val}:x));
  const updateWi=(id,field,val)=>setWi(p=>p.map(x=>x.id===id?{...x,[field]:val}:x));

  const resetAll=()=>{
    if(!confirm("Reset ALL data to defaults? This cannot be undone."))return;
    const nr=INIT_RAW.map((x,i)=>({...x,id:i,qty:x.d[3]||0}));
    const nw=INIT_WEEKLY.map((x,i)=>({...x,id:i+1000,qty:0}));
    const nj=JOBS.map((x,i)=>({...x,id:i+2000}));
    setRi(nr);setWi(nw);setJobs(nj);
    saveState({ri:nr,wi:nw,jobs:nj});
    setSaveMsg("🔄 Reset done");
    setTimeout(()=>setSaveMsg(null),2000);
  };

  const exportCSV=()=>{
    const rows=[["Category","Name","UOM","Qty","Min","Room"],...ri.map(x=>[x.c,x.n,x.u,x.qty,x.mn,getRoom(x)])];
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="marky-stock-"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };

  const low=ri.filter(x=>x.qty<=x.mn);
  const lowWi=wi.filter(x=>x.g!=="Empties"&&x.qty<=x.mn);

  const TABS=[
    {id:"stock",icon:"📦",label:"Stock"},
    {id:"count",icon:"📋",label:"Count"},
    {id:"rooms",icon:"🏭",label:"Rooms"},
    {id:"reorder",icon:"⚠️",label:`Reorder${low.length+lowWi.length>0?" "+((low.length+lowWi.length)):""}`,badge:low.length+lowWi.length},
    {id:"data",icon:"💾",label:"Data"},
  ];

  return(
    <div style={s.app}>
      {/* Header */}
      <div style={s.hdr}>
        <div style={s.hdrTitle}>MARKY INDUSTRIES</div>
        <div style={s.hdrSub}>Warehouse Inventory · Crestmead QLD · v1.3</div>
      </div>

      {/* Content */}
      <div style={s.content}>
        {tab==="stock"&&<StockTab ri={ri} updateRi={updateRi} wi={wi}/>}
        {tab==="count"&&<CountTab ri={ri} updateRi={updateRi} wi={wi} updateWi={updateWi}/>}
        {tab==="rooms"&&<RoomsTab ri={ri} updateRi={updateRi}/>}
        {tab==="reorder"&&<ReorderTab low={low} lowWi={lowWi}/>}
        {tab==="data"&&<DataTab ri={ri} wi={wi} jobs={jobs} setRi={setRi} setWi={setWi} setJobs={setJobs} resetAll={resetAll} exportCSV={exportCSV} manualSave={manualSave}/>}
      </div>

      {/* Save indicator */}
      {saveMsg&&<div style={s.saveBar}><span>{saveMsg}</span><span>localStorage ✅</span></div>}

      {/* Nav */}
      <div style={s.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={s.navBtn(tab===t.id)} onClick={()=>setTab(t.id)}>
            <span style={s.navIco}>{t.icon}</span>
            <span>{t.badge>0?`(${t.badge})`:""}{t.label.replace(/ \d+$/,"")}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══ DATA TAB ════════════════════════════════════════════════════════════════
function DataTab({ri,wi,jobs,setRi,setWi,setJobs,resetAll,exportCSV,manualSave}){
  const importCSV=(e,type)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const lines=ev.target.result.split("\n").filter(Boolean);
      const headers=lines[0].split(",");
      const rows=lines.slice(1).map(l=>{
        const v=l.split(",");
        return Object.fromEntries(headers.map((h,i)=>[h.trim(),v[i]?.trim()]));
      });
      if(type==="raw"){
        setRi(prev=>prev.map(x=>{
          const match=rows.find(r=>r.name===x.n||r.Item===x.n);
          if(match){
            return{...x,qty:parseFloat(match.Qty||match.qty||x.qty)||x.qty,mn:parseFloat(match.Min||match.min||x.mn)||x.mn};
          }
          return x;
        }));
        alert("✅ Raw materials updated from CSV");
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const rawRef=useRef();

  return(
    <div>
      <div style={s.card}>
        <div style={s.section}>💾 Save & Export</div>
        <div style={s.row}>
          <button style={s.btn(C.grn)} onClick={manualSave}>💾 Save Now</button>
          <button style={s.btn(C.teal)} onClick={exportCSV}>📤 Export CSV</button>
        </div>
        <div style={{fontSize:10,color:C.dim,marginTop:4}}>Data auto-saves every 1.5 seconds to this device's local storage</div>
      </div>
      <div style={s.card}>
        <div style={s.section}>📥 Import CSV</div>
        <button style={{...s.btn(C.blue),marginBottom:6}} onClick={()=>rawRef.current.click()}>📂 Import Raw Materials CSV</button>
        <input ref={rawRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>importCSV(e,"raw")}/>
        <div style={{fontSize:10,color:C.dim}}>CSV must have columns: name, Qty, Min (or Item, Qty, Min)</div>
      </div>
      <div style={s.card}>
        <div style={s.section}>📊 Summary</div>
        <div style={{fontSize:12,lineHeight:1.8}}>
          <div>📦 Raw materials: <strong>{ri.length}</strong></div>
          <div>🧹 Weekly consumables: <strong>{wi.filter(x=>x.g!=="Empties").length}</strong></div>
          <div>🔧 Job items: <strong>{jobs.length}</strong></div>
          <div>⚠️ Low stock: <strong style={{color:C.red}}>{ri.filter(x=>x.qty<=x.mn).length}</strong></div>
          <div>🏢 Marky Industries Pty Ltd · ABN 72 010 795 310</div>
          <div>📍 1 Magnesium Drive, Crestmead QLD 4132</div>
        </div>
      </div>
      <div style={{...s.card,border:"2px solid "+C.red}}>
        <div style={s.section}>🔄 Reset Data</div>
        <div style={{fontSize:11,color:C.dim,marginBottom:8}}>Reset all quantities back to original defaults. Minimums are kept.</div>
        <button style={s.btn(C.red)} onClick={resetAll}>🗑️ Reset All Data</button>
      </div>
    </div>
  );
}

// ═══ RENDER ══════════════════════════════════════════════════════════════════
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
