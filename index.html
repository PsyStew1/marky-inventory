function App(){
  const sv=lsLoad();
  const [ri,setRi]=useState(()=>sv?.ri||R_INIT.map((x,i)=>({...x,id:i,qty:x.d[1]??0})));
  const [wi,setWi]=useState(()=>sv?.wi||W_INIT.map((x,i)=>({...x,id:i+1000,qty:x.d[2]??0})));
  const [drums,setDrums]=useState(()=>sv?.drums||DEF_DRUMS.map((x,i)=>({...x,id:i+2000})));
  const [ibcs,setIbcs]=useState(()=>sv?.ibcs||DEF_IBCS.map((x,i)=>({...x,id:i+3000})));
  const [deliveries,setDeliveries]=useState(()=>sv?.deliveries||[]);
  const [pg,setPg]=useState("stock");
  const [subPg,setSubPg]=useState("monthly");
  const [sCat,setSCat]=useState("All");
  const [cCat,setCCat]=useState("All");
  const [wGrp,setWGrp]=useState("All");
  const [hwRoom,setHwRoom]=useState("main");
  const [jTab,setJTab]=useState(JOB_NAMES[0]);
  const [q,setQ]=useState("");
  const [saveMsg,setSaveMsg]=useState(null);
  const timer=useRef(null);

  // Auto-save
  useEffect(()=>{
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      lsSave({ri,wi,drums,ibcs,deliveries});
      setSaveMsg("✅ Saved");
      setTimeout(()=>setSaveMsg(null),1200);
    },1500);
    return()=>clearTimeout(timer.current);
  },[ri,wi,drums,ibcs,deliveries]);

  const updR=(id,f,v)=>setRi(p=>p.map(x=>x.id===id?{...x,[f]:v}:x));
  const updW=(id,f,v)=>setWi(p=>p.map(x=>x.id===id?{...x,[f]:v}:x));
  const updD=(id,v)=>setDrums(p=>p.map(x=>x.id===id?{...x,ct:v}:x));
  const updI=(id,v)=>setIbcs(p=>p.map(x=>x.id===id?{...x,ct:v}:x));

  const CATS=[...new Set(ri.map(x=>x.c))].sort();
  const WGRPS=[...new Set(wi.map(x=>x.g))];
  const low=ri.filter(x=>x.qty<=x.m&&x.qty>=0);
  const lowW=wi.filter(x=>x.m>0&&x.qty<=x.m);
  const totalLow=low.length+lowW.length;

  const exportCSV=()=>{
    const rows=[["Category","Name","UOM","28-Feb Count","Current Qty","Min","Room"],
      ...ri.map(x=>[x.c,x.n,x.u,x.d[1]??"-",x.qty,x.m,getRoom(x)])];
    const b=new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download="marky-stock-"+new Date().toISOString().slice(0,10)+".csv";a.click();
  };

  const reset=()=>{
    if(!confirm("Reset ALL data to defaults? Cannot be undone."))return;
    const nr=R_INIT.map((x,i)=>({...x,id:i,qty:x.d[1]??0}));
    const nw=W_INIT.map((x,i)=>({...x,id:i+1000,qty:x.d[2]??0}));
    setRi(nr);setWi(nw);setDrums(DEF_DRUMS.map((x,i)=>({...x,id:i+2000})));
    setIbcs(DEF_IBCS.map((x,i)=>({...x,id:i+3000})));setDeliveries([]);
  };

  const TABS=[
    {id:"stock",lb:"📦 Stock"},
    {id:"count",lb:"📋 Count"},
    {id:"rooms",lb:"🏠 Rooms"},
    {id:"jobs",lb:"🏗 Jobs"},
    {id:"reorder",lb:`⚠️ Reorder${totalLow>0?" ("+totalLow+")":""}`},
    {id:"empties",lb:"🛢 Empties"},
    {id:"data",lb:"💾 Data"},
  ];

  const filt=(list)=>{const sq=q.toLowerCase();return sq?list.filter(x=>x.n.toLowerCase().includes(sq)):list;};

  return(
    <div style={s.app}>
      <div style={s.hdr}>
        <div style={{fontSize:15,fontWeight:700}}>MARKY INDUSTRIES</div>
        <div style={{fontSize:9,color:"#8FA3B8",marginTop:2}}>
          Warehouse Inventory · Crestmead QLD · v1.1
          {saveMsg&&<span style={{color:"#4ade80",marginLeft:8}}>{saveMsg}</span>}
        </div>
      </div>

      <div style={s.tabs}>
        {TABS.map(t=>(
          <button key={t.id} style={s.tab(pg===t.id)} onClick={()=>{setPg(t.id);setQ("");}}>
            {t.lb}
          </button>
        ))}
      </div>

      <div style={s.content}>

        {/* ── STOCK TAB ── */}
        {pg==="stock"&&(
          <div>
            <div style={{...s.card,background:"#EFF6FF",marginBottom:8}}>
              <div style={s.row}>
                <div style={{flex:1}}>
                  <label style={s.lbl}>🔍 Search items</label>
                  <input style={s.inp()} value={q} onChange={e=>setQ(e.target.value)} placeholder="Type to search..."/>
                </div>
                <div>
                  <label style={s.lbl}>Category</label>
                  <select style={s.inp(130)} value={sCat} onChange={e=>setSCat(e.target.value)}>
                    <option>All</option>{CATS.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div style={{fontSize:10,color:C.dim}}>
                {ri.length} items · <span style={{color:C.red,fontWeight:700}}>{low.length} low stock</span> · {ri.filter(x=>x.qty===0).length} zero
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={s.tbl}>
                <thead><tr>
                  <th style={s.th}>Cat</th><th style={s.th}>Item</th><th style={s.th}>UOM</th>
                  <th style={s.th}>Prev</th><th style={s.th}>28-Feb</th>
                  <th style={s.th}>Current</th><th style={s.th}>Min</th><th style={s.th}>Room</th>
                </tr></thead>
                <tbody>
                  {filt(ri).filter(x=>sCat==="All"||x.c===sCat).map(x=>{
                    const isLow=x.qty<=x.m;
                    return(
                      <tr key={x.id} style={{background:isLow?"#FEF2F2":"transparent"}}>
                        <td style={s.td}><span style={s.badge(CC[x.c]||C.dim)}>{x.c.slice(0,4)}</span></td>
                        <td style={{...s.td,minWidth:160,maxWidth:220,fontSize:11}}>{isLow&&"🔴 "}{x.n}</td>
                        <td style={{...s.td,fontSize:9,color:C.dim}}>{x.u}</td>
                        <td style={{...s.td,textAlign:"center",color:C.dim}}>{x.d[0]??"-"}</td>
                        <td style={{...s.td,textAlign:"center",background:"#EFF6FF"}}>{x.d[1]??"-"}</td>
                        <td style={s.td}><input type="number" style={s.numI} value={x.qty} min={0} step={0.25}
                          onChange={e=>updR(x.id,"qty",parseFloat(e.target.value)||0)}/></td>
                        <td style={s.td}><input type="number" style={s.minI} value={x.m} min={0} step={0.5}
                          onChange={e=>updR(x.id,"m",parseFloat(e.target.value)||0)}/></td>
                        <td style={{...s.td,fontSize:9}}>{ROOM_LBL[getRoom(x)]}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── COUNT TAB ── */}
        {pg==="count"&&(
          <div>
            <div style={s.row}>
              <button style={s.btn(subPg==="monthly"?C.hdr:"#E5E7EB",subPg==="monthly"?C.wht:C.hdr)} onClick={()=>setSubPg("monthly")}>📅 Monthly</button>
              <button style={s.btn(subPg==="weekly"?C.org:"#E5E7EB",subPg==="weekly"?C.wht:C.hdr)} onClick={()=>setSubPg("weekly")}>📆 Weekly</button>
            </div>

            {subPg==="monthly"&&(
              <div>
                <div style={{...s.card,background:"#F0FDF4",marginBottom:8}}>
                  <label style={s.lbl}>Category</label>
                  <select style={s.inp(160)} value={cCat} onChange={e=>setCCat(e.target.value)}>
                    <option>All</option>{CATS.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={s.tbl}>
                    <thead><tr>
                      <th style={s.th}>Cat</th><th style={s.th}>Item</th><th style={s.th}>UOM</th>
                      {MO_DATES.map(d=><th key={d} style={{...s.th,background:d==="28-Feb"?"#DBEAFE":undefined,textAlign:"center"}}>{d}</th>)}
                      <th style={{...s.th,background:"#F0FDF4",textAlign:"center"}}>Now</th>
                      <th style={{...s.th,textAlign:"center"}}>Min</th>
                    </tr></thead>
                    <tbody>
                      {ri.filter(x=>cCat==="All"||x.c===cCat).map(x=>(
                        <tr key={x.id} style={{background:x.qty<=x.m?"#FEF2F2":"transparent"}}>
                          <td style={s.td}><span style={s.badge(CC[x.c]||C.dim)}>{x.c.slice(0,3)}</span></td>
                          <td style={{...s.td,minWidth:150,fontSize:11}}>{x.n}</td>
                          <td style={{...s.td,fontSize:9,color:C.dim}}>{x.u}</td>
                          {x.d.slice(0,4).map((v,i)=>(
                            <td key={i} style={{...s.td,textAlign:"center",background:i===3?"#EFF6FF":undefined}}>{v??"-"}</td>
                          ))}
                          <td style={{...s.td,background:"#F0FDF4"}}>
                            <input type="number" style={s.numI} value={x.qty} min={0} step={0.25}
                              onChange={e=>updR(x.id,"qty",parseFloat(e.target.value)||0)}/>
                          </td>
                          <td style={s.td}>
                            <input type="number" style={s.minI} value={x.m} min={0} step={0.5}
                              onChange={e=>updR(x.id,"m",parseFloat(e.target.value)||0)}/>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {subPg==="weekly"&&(
              <div>
                <div style={{...s.card,background:"#FFF7ED",marginBottom:8}}>
                  <label style={s.lbl}>Group</label>
                  <select style={s.inp(160)} value={wGrp} onChange={e=>setWGrp(e.target.value)}>
                    <option>All</option>{WGRPS.map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={s.tbl}>
                    <thead><tr>
                      <th style={s.th}>Group</th><th style={s.th}>Item</th><th style={s.th}>Min</th>
                      {WK_DATES.map(d=><th key={d} style={{...s.th,textAlign:"center"}}>{d}</th>)}
                      <th style={{...s.th,background:"#F0FDF4",textAlign:"center"}}>Now</th>
                    </tr></thead>
                    <tbody>
                      {wi.filter(x=>wGrp==="All"||x.g===wGrp).map(x=>(
                        <tr key={x.id} style={{background:x.m>0&&x.qty<=x.m?"#FEF2F2":"transparent"}}>
                          <td style={{...s.td,fontSize:9,color:C.dim,whiteSpace:"nowrap"}}>{x.g}</td>
                          <td style={{...s.td,minWidth:140,fontSize:11}}>{x.n}</td>
                          <td style={{...s.td,textAlign:"center",fontSize:10}}>{x.m||"-"}</td>
                          {x.d.slice(0,4).map((v,i)=>(
                            <td key={i} style={{...s.td,textAlign:"center"}}>{v??"-"}</td>
                          ))}
                          <td style={{...s.td,background:"#F0FDF4"}}>
                            <input type="number" style={s.numI} value={x.qty} min={0}
                              onChange={e=>updW(x.id,"qty",parseFloat(e.target.value)||0)}/>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── ROOMS TAB ── */}
        {pg==="rooms"&&(
          <div>
            <div style={s.row}>
              {["main","stainless","locked","storeroom2"].map(r=>(
                <button key={r} style={{...s.btn(hwRoom===r?C.hdr:"#E5E7EB",hwRoom===r?C.wht:C.hdr),fontSize:10}}
                  onClick={()=>setHwRoom(r)}>{ROOM_LBL[r]}</button>
              ))}
            </div>
            <div style={{...s.card,background:"#F8FAFC",marginBottom:8}}>
              <div style={{fontWeight:700}}>{ROOM_LBL[hwRoom]}</div>
              <div style={{fontSize:10,color:C.dim,marginTop:2}}>{ROOM_DESC[hwRoom]}</div>
              <div style={{fontSize:10,color:C.dim}}>{ri.filter(x=>getRoom(x)===hwRoom).length} items</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={s.tbl}>
                <thead><tr>
                  <th style={s.th}>Cat</th><th style={s.th}>Item</th><th style={s.th}>UOM</th>
                  <th style={s.th}>Current</th><th style={s.th}>Min</th>
                </tr></thead>
                <tbody>
                  {ri.filter(x=>getRoom(x)===hwRoom).map(x=>(
                    <tr key={x.id} style={{background:x.qty<=x.m?"#FEF2F2":"transparent"}}>
                      <td style={s.td}><span style={s.badge(CC[x.c]||C.dim)}>{x.c.slice(0,4)}</span></td>
                      <td style={{...s.td,minWidth:160,fontSize:11}}>{x.qty<=x.m&&"🔴 "}{x.n}</td>
                      <td style={{...s.td,fontSize:9,color:C.dim}}>{x.u}</td>
                      <td style={s.td}><input type="number" style={s.numI} value={x.qty} min={0} step={0.25}
                        onChange={e=>updR(x.id,"qty",parseFloat(e.target.value)||0)}/></td>
                      <td style={s.td}><input type="number" style={s.minI} value={x.m} min={0} step={0.5}
                        onChange={e=>updR(x.id,"m",parseFloat(e.target.value)||0)}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── JOBS TAB ── */}
        {pg==="jobs"&&(
          <div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
              {JOB_NAMES.map(j=>(
                <button key={j} style={s.btn(jTab===j?C.blue:"#E5E7EB",jTab===j?C.wht:C.hdr)}
                  onClick={()=>setJTab(j)}>{j}</button>
              ))}
            </div>
            <table style={s.tbl}>
              <thead><tr>
                <th style={s.th}>Description</th><th style={s.th}>Count</th>
              </tr></thead>
              <tbody>
                {JD.filter(x=>x.j===jTab).map((x,i)=>(
                  <tr key={i} style={{background:i%2===0?"#F8FAFC":"transparent"}}>
                    <td style={{...s.td,fontSize:11}}>{x.d}</td>
                    <td style={{...s.td,fontWeight:700,color:x.ct>0?C.grn:C.dim}}>{x.ct}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* ── REORDER TAB ── */}
        {pg==="reorder"&&(
          <div>
            {totalLow===0?(
              <div style={{...s.card,textAlign:"center",padding:30}}>
                <div style={{fontSize:40}}>✅</div>
                <div style={{fontWeight:700,fontSize:15,marginTop:8}}>All stock levels OK</div>
              </div>
            ):(
              <>
                <div style={{...s.card,background:"#FEF2F2"}}>
                  <div style={{fontWeight:700,color:C.red}}>⚠️ {totalLow} items need reordering</div>
                  <div style={{fontSize:10,color:C.dim}}>{low.length} raw materials · {lowW.length} consumables</div>
                </div>
                {low.length>0&&(
                  <table style={{...s.tbl,marginBottom:12}}>
                    <thead><tr>
                      <th style={s.th}>Cat</th><th style={s.th}>Item</th>
                      <th style={s.th}>Now</th><th style={s.th}>Min</th><th style={s.th}>Short</th>
                    </tr></thead>
                    <tbody>
                      {low.map(x=>(
                        <tr key={x.id} style={{background:"#FEF2F2"}}>
                          <td style={s.td}><span style={s.badge(CC[x.c]||C.dim)}>{x.c.slice(0,4)}</span></td>
                          <td style={{...s.td,fontSize:11}}>{x.n}</td>
                          <td style={{...s.td,color:C.red,fontWeight:700}}>{x.qty}</td>
                          <td style={s.td}>{x.m}</td>
                          <td style={{...s.td,color:C.red,fontWeight:700}}>-{(x.m-x.qty).toFixed(2)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
                {lowW.length>0&&(
                  <table style={s.tbl}>
                    <thead><tr>
                      <th style={s.th}>Group</th><th style={s.th}>Item</th>
                      <th style={s.th}>Now</th><th style={s.th}>Min</th>
                    </tr></thead>
                    <tbody>
                      {lowW.map(x=>(
                        <tr key={x.id} style={{background:"#FEF2F2"}}>
                          <td style={{...s.td,fontSize:9,color:C.dim}}>{x.g}</td>
                          <td style={{...s.td,fontSize:11}}>{x.n}</td>
                          <td style={{...s.td,color:C.red,fontWeight:700}}>{x.qty}</td>
                          <td style={s.td}>{x.m}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </>
            )}
          </div>
        )}

        {/* ── EMPTIES TAB ── */}
        {pg==="empties"&&(
          <div>
            <div style={{...s.card,background:"#FFF7ED",marginBottom:8}}>
              <div style={{fontWeight:700}}>🛢 Empty Containers — Return Tracking</div>
              <div style={{fontSize:10,color:C.dim,marginTop:2}}>Track empties for supplier return / disposal</div>
            </div>
            <div style={{fontWeight:600,fontSize:11,margin:"8px 0 4px"}}>Drums</div>
            <table style={s.tbl}>
              <thead><tr><th style={s.th}>Type</th><th style={s.th}>Count</th></tr></thead>
              <tbody>
                {drums.map(x=>(
                  <tr key={x.id}>
                    <td style={s.td}>{x.n}</td>
                    <td style={s.td}><input type="number" style={s.numI} value={x.ct} min={0}
                      onChange={e=>updD(x.id,parseInt(e.target.value)||0)}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{fontWeight:600,fontSize:11,margin:"12px 0 4px"}}>IBCs</div>
            <table style={s.tbl}>
              <thead><tr><th style={s.th}>Type</th><th style={s.th}>Count</th></tr></thead>
              <tbody>
                {ibcs.map(x=>(
                  <tr key={x.id}>
                    <td style={s.td}>{x.n}</td>
                    <td style={s.td}><input type="number" style={s.numI} value={x.ct} min={0}
                      onChange={e=>updI(x.id,parseInt(e.target.value)||0)}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* ── DATA TAB ── */}
        {pg==="data"&&(
          <div>
            <div style={s.card}>
              <div style={{fontWeight:700,marginBottom:8}}>💾 Save & Export</div>
              <div style={s.row}>
                <button style={s.btn(C.grn)} onClick={()=>{lsSave({ri,wi,drums,ibcs,deliveries});setSaveMsg("✅ Saved!");setTimeout(()=>setSaveMsg(null),2000);}}>💾 Save Now</button>
                <button style={s.btn(C.teal)} onClick={exportCSV}>📤 Export CSV</button>
              </div>
              <div style={{fontSize:10,color:C.dim,marginTop:4}}>Auto-saves every 1.5 seconds via localStorage</div>
            </div>
            <div style={s.card}>
              <div style={{fontWeight:700,marginBottom:6}}>📊 Summary</div>
              <div style={{fontSize:12,lineHeight:1.9}}>
                <div>📦 Raw materials: <strong>{ri.length}</strong></div>
                <div>🧹 Weekly consumables: <strong>{wi.length}</strong></div>
                <div>🏗 Job items: <strong>{JD.length}</strong> across {JOB_NAMES.length} companies</div>
                <div>⚠️ Low stock raw: <strong style={{color:C.red}}>{low.length}</strong></div>
                <div>📍 1 Magnesium Drive, Crestmead QLD 4132</div>
                <div>🏢 ABN 72 010 795 310</div>
              </div>
            </div>
            <div style={{...s.card,border:"2px solid "+C.red}}>
              <div style={{fontWeight:700,color:C.red,marginBottom:6}}>🔄 Reset All Data</div>
              <div style={{fontSize:11,color:C.dim,marginBottom:8}}>Resets all quantities to 28-Feb defaults.</div>
              <button style={s.btn(C.red)} onClick={reset}>🗑️ Reset All</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
